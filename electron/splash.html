<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Blog Pick</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #1a1a1a;
        color: #e5e5e5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
          "Malgun Gothic", "맑은 고딕", sans-serif;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 14px;
        padding: 0 20px;
        box-sizing: border-box;
      }
      .title {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      .sub {
        font-size: 12px;
        color: #a0a0a0;
      }
      .bar {
        width: 80%;
        height: 3px;
        background: #2a2a2a;
        border-radius: 999px;
        overflow: hidden;
        position: relative;
      }
      .bar::after {
        content: "";
        position: absolute;
        top: 0;
        left: -40%;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, transparent, #6a8cff, transparent);
        animation: slide 1.2s ease-in-out infinite;
      }
      @keyframes slide {
        0%   { left: -40%; }
        100% { left: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="title">업데이트 설치 중…</div>
      <div class="bar"></div>
      <div class="sub">잠시 후 새 버전이 자동으로 실행됩니다.</div>
    </div>
  </body>
</html>
