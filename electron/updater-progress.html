<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>App Blog Publisher 업데이트</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #1a1a1a;
        color: #e5e5e5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
          "Malgun Gothic", "맑은 고딕", sans-serif;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 18px 20px;
        box-sizing: border-box;
        gap: 12px;
      }
      .title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      .bar {
        width: 100%;
        height: 6px;
        background: #2a2a2a;
        border-radius: 999px;
        overflow: hidden;
        position: relative;
      }
      .bar > .fill {
        position: absolute;
        top: 0; left: 0;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #6a8cff, #8aa6ff);
        border-radius: 999px;
        transition: width 0.25s ease-out;
      }
      .bar.indeterminate > .fill {
        display: none;
      }
      .bar.indeterminate::after {
        content: "";
        position: absolute;
        top: 0;
        left: -40%;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, transparent, #6a8cff, transparent);
        animation: slide 1.2s ease-in-out infinite;
      }
      @keyframes slide {
        0%   { left: -40%; }
        100% { left: 100%; }
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .sub {
        font-size: 12px;
        color: #a0a0a0;
      }
      button.cancel {
        appearance: none;
        background: transparent;
        color: #c0c0c0;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        font-size: 12px;
        padding: 5px 12px;
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
      }
      button.cancel:hover:not(:disabled) {
        background: #2a2a2a;
        color: #fff;
        border-color: #4a4a4a;
      }
      button.cancel:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="title">App Blog Publisher 업데이트</div>
      <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
      <div class="row">
        <div class="sub" id="sub">다운로드 준비 중…</div>
        <button class="cancel" id="cancelBtn" type="button">취소</button>
      </div>
    </div>
    <script>
      (function () {
        var bar = document.getElementById("bar");
        var fill = document.getElementById("fill");
        var sub = document.getElementById("sub");
        var cancelBtn = document.getElementById("cancelBtn");

        if (window.api && typeof window.api.onProgress === "function") {
          window.api.onProgress(function (payload) {
            if (!payload || typeof payload !== "object") return;
            if (payload.phase === "downloading") {
              bar.classList.remove("indeterminate");
              var pct = Math.max(0, Math.min(100, Number(payload.percent) || 0));
              fill.style.width = pct + "%";
              sub.textContent = "다운로드 중… " + pct.toFixed(0) + "%";
              cancelBtn.disabled = false;
            } else if (payload.phase === "installing") {
              bar.classList.add("indeterminate");
              sub.textContent = "곧 재시작됩니다…";
              cancelBtn.disabled = true;
            }
          });
        }

        cancelBtn.addEventListener("click", function () {
          if (cancelBtn.disabled) return;
          cancelBtn.disabled = true;
          sub.textContent = "취소 중…";
          if (window.api && typeof window.api.cancel === "function") {
            window.api.cancel();
          }
        });
      })();
    </script>
  </body>
</html>
