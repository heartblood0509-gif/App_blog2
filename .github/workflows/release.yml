name: Release Desktop App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to rebuild, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Check tag matches package version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
              echo "This workflow must be run from a v*.*.* tag for publishing." >&2
              exit 1
            fi
          fi
          if [[ "${tag}" != "v${version}" ]]; then
            echo "Tag ${tag} does not match package.json version ${version}." >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    needs: validate
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\playwright-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Electron native app dependencies
        run: npx electron-builder install-app-deps

      - name: Build backend
        run: npm run build:backend

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build Next frontend
        run: npm run build:next

      - name: Fetch bundled ffmpeg (win64 GPL static)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/ffmpeg
          # ⚠️ GPL 빌드여야 한다. LGPL 빌드엔 libx264(H.264 인코더) 가 없어 영상 인코딩이
          # 전부 실패한다(0.3.0 윈도우 영상생성 불가 버그). 아래 Verify 단계가 libx264 를 강제 검증.
          # ⚠️ 버전 고정(핀) 필수. 예전엔 'latest'(매일 바뀌는 master)를 받았는데, master 가
          # 옵션을 삭제하면(예: filter_script:v 제거) 빌드 시점에 따라 윈도우 영상생성이 조용히
          # 깨졌다(0.3.6-rc1 사고). macOS 처럼 특정 빌드 + 바이너리 SHA256 으로 고정한다.
          # (갱신 시: BtbN autobuild 태그/자산명 + 아래 두 해시를 함께 교체.)
          FF_TAG="autobuild-2026-06-24-13-41"
          FF_DIR="ffmpeg-N-125258-gdf94900c98-win64-gpl"
          curl -L -o ffmpeg.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/${FF_TAG}/${FF_DIR}.zip"
          unzip -q ffmpeg.zip -d ffmpeg-extract
          cp "ffmpeg-extract/${FF_DIR}/bin/ffmpeg.exe" build/ffmpeg/ffmpeg.exe
          cp "ffmpeg-extract/${FF_DIR}/bin/ffprobe.exe" build/ffmpeg/ffprobe.exe
          # SHA256 고정(압축 푼 실행 파일 기준 — zip 재압축돼도 실행 파일만 같으면 통과).
          echo "4cf11084698a291ffb920733f499833bf446a775c568afceb8aa4b061cfd596d  build/ffmpeg/ffmpeg.exe" | sha256sum -c -
          echo "b887155488f3005406e0db49c09b4ae0182ebf8044c2572d2f28b2f589348d62  build/ffmpeg/ffprobe.exe" | sha256sum -c -

      - name: Verify bundled ffmpeg (libfreetype + exec)
        run: node scripts/check-ffmpeg.js

      - name: Package Windows
        run: npx electron-builder --win --x64 --publish never

      - name: Assert shorts engine + ffmpeg bundled
        shell: bash
        run: |
          set -euo pipefail
          res="release/win-unpacked/resources"
          test -f "$res/youtube-backend/YoutubeGenerator.exe" || { echo "::error::youtube engine missing from package"; exit 1; }
          test -f "$res/ffmpeg/ffmpeg.exe" || { echo "::error::ffmpeg missing from package"; exit 1; }
          # Playwright: headed 크로미움(발행 필수)은 반드시 있고, headless 셸(경량화 대상)은 없어야 한다.
          ls -d "$res/ms-playwright/chromium-"* >/dev/null 2>&1 || { echo "::error::playwright headed chromium missing from package"; exit 1; }
          if ls -d "$res/ms-playwright/chromium_headless_shell-"* >/dev/null 2>&1; then echo "::error::headless shell should be excluded but is bundled"; exit 1; fi
          echo "OK: shorts engine + ffmpeg + playwright(headed only) bundled"

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-assets
          if-no-files-found: error
          path: |
            release/*.exe
            release/latest.yml

  build-macos:
    name: Build macOS ${{ matrix.arch }} package
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          # 애플실리콘(M1~M4). macos-latest 는 현재 arm64 지만 미래에 바뀔 수 있어 버전 핀.
          - arch: arm64
            runner: macos-14
            label: AppleSilicon
          # 인텔(x86_64). macos-13 은 2025-12-04 제거됨 → macos-15-intel(2027-08 까지 지원)이 유일한
          # GitHub 호스팅 인텔 러너. PyInstaller 엔진은 크로스빌드 불가라 반드시 네이티브 인텔 러너에서 빌드.
          - arch: x64
            runner: macos-15-intel
            label: Intel
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/playwright-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Electron native app dependencies
        run: npx electron-builder install-app-deps

      - name: Build backend
        run: npm run build:backend

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build Next frontend
        run: npm run build:next

      - name: Fetch bundled ffmpeg (macOS ${{ matrix.arch }} static)
        run: |
          set -euo pipefail
          mkdir -p build/ffmpeg
          # ⚠️ libfreetype/libx264 + 아키텍처는 아래 Verify 단계가 강제 검증한다(틀리면 RC 빌드 실패 → 소스 교체).
          # 두 칩 모두 osxexperts.net 정적 빌드 사용(arm=8.1 / intel=8.0). evermeet.cx 는 x86_64 만 제공하고
          # /pub 이 타 호스트로 리다이렉트돼 CI 고정 URL 로 불안정 → 같은 소스(osxexperts)로 일관 유지.
          # SHA256 고정: 압축 푼 "바이너리" 기준(다운로드해 계산). zip 이 재압축돼도 실제 실행 파일만 같으면 통과.
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            FFMPEG_URL="https://www.osxexperts.net/ffmpeg81arm.zip"
            FFPROBE_URL="https://www.osxexperts.net/ffprobe81arm.zip"
            FFMPEG_BIN_SHA256="9a08d61f9328e8164ba560ee7a79958e357307fcfeea6fe626b7d66cdc287028"
            FFPROBE_BIN_SHA256="aab17ac7379c1178aaf400c3ef36cdb67db0b75b1a23eeef2cb9f658be8844e6"
          else
            FFMPEG_URL="https://www.osxexperts.net/ffmpeg80intel.zip"
            FFPROBE_URL="https://www.osxexperts.net/ffprobe80intel.zip"
            FFMPEG_BIN_SHA256="df3f1e3facdc1ae0ad0bd898cdfb072fbc9641bf47b11f172844525a05db8d11"
            FFPROBE_BIN_SHA256="5228e651e2bd67bb55819b27f6138351587b16d2b87446007bf35b7cf930d891"
          fi
          curl -L -o ffmpeg.zip "$FFMPEG_URL"
          curl -L -o ffprobe.zip "$FFPROBE_URL"
          unzip -o -q ffmpeg.zip -d build/ffmpeg -x "__MACOSX/*"
          unzip -o -q ffprobe.zip -d build/ffmpeg -x "__MACOSX/*"
          echo "${FFMPEG_BIN_SHA256}  build/ffmpeg/ffmpeg" | shasum -a 256 -c -
          echo "${FFPROBE_BIN_SHA256}  build/ffmpeg/ffprobe" | shasum -a 256 -c -
          chmod +x build/ffmpeg/ffmpeg build/ffmpeg/ffprobe

      - name: Verify bundled ffmpeg (libfreetype + exec + arch)
        run: |
          set -euo pipefail
          node scripts/check-ffmpeg.js
          # 네이티브 러너에서 빌드하므로 칩과 ffmpeg/ffprobe 아키텍처가 일치해야 한다(불일치 시 배포본에서 실행 불가).
          EXPECT_ARCH="arm64"; [ "${{ matrix.arch }}" = "x64" ] && EXPECT_ARCH="x86_64"
          file build/ffmpeg/ffmpeg  | grep -qi "$EXPECT_ARCH" || { echo "::error::bundled ffmpeg arch mismatch (expected $EXPECT_ARCH)"; exit 1; }
          file build/ffmpeg/ffprobe | grep -qi "$EXPECT_ARCH" || { echo "::error::bundled ffprobe arch mismatch (expected $EXPECT_ARCH)"; exit 1; }

      - name: Build macOS .app (unpacked)
        run: npx electron-builder --mac --${{ matrix.arch }} --dir --publish never

      - name: Assert shorts engine + ffmpeg bundled (.app)
        run: |
          set -euo pipefail
          APP=$(find release -maxdepth 3 -type d -name "Blog Pick.app" | head -1)
          res="$APP/Contents/Resources"
          test -f "$res/youtube-backend/YoutubeGenerator" || { echo "::error::youtube engine missing from .app"; exit 1; }
          test -f "$res/backend/BlogPublisher" || { echo "::error::blog engine missing from .app"; exit 1; }
          test -f "$res/ffmpeg/ffmpeg" || { echo "::error::ffmpeg missing from .app"; exit 1; }
          # 두 PyInstaller 엔진 모두 빌드 러너 칩과 동일 아키텍처여야 한다(섞이면 배포본에서 실행 불가).
          EXPECT_ARCH="arm64"; [ "${{ matrix.arch }}" = "x64" ] && EXPECT_ARCH="x86_64"
          file "$res/youtube-backend/YoutubeGenerator" | grep -qi "$EXPECT_ARCH" || { echo "::error::shorts engine arch mismatch (expected $EXPECT_ARCH)"; exit 1; }
          file "$res/backend/BlogPublisher"            | grep -qi "$EXPECT_ARCH" || { echo "::error::blog engine arch mismatch (expected $EXPECT_ARCH)"; exit 1; }
          # Playwright: headed 크로미움(발행 필수)은 반드시 있고, headless 셸(경량화 대상)은 없어야 한다.
          ls -d "$res/ms-playwright/chromium-"* >/dev/null 2>&1 || { echo "::error::playwright headed chromium missing from .app"; exit 1; }
          if ls -d "$res/ms-playwright/chromium_headless_shell-"* >/dev/null 2>&1; then echo "::error::headless shell should be excluded but is bundled"; exit 1; fi
          echo "OK: shorts+blog engine + ffmpeg + playwright(headed only) bundled (${EXPECT_ARCH})"

      - name: Apply clean ad-hoc signature
        shell: bash
        run: |
          APP_PATH=$(find release -maxdepth 3 -type d -name "Blog Pick.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "App bundle not found in release/" >&2
            exit 1
          fi
          echo "Re-signing: $APP_PATH"
          codesign --remove-signature "$APP_PATH" 2>/dev/null || true
          codesign --force --deep --sign - --timestamp=none "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | grep -E "Signature|Identifier|TeamIdentifier" || true

      - name: Package macOS .dmg/.zip from signed .app
        shell: bash
        run: |
          APP_PATH=$(find release -maxdepth 3 -type d -name "Blog Pick.app" | head -1)
          npx electron-builder --mac --${{ matrix.arch }} --prepackaged "$APP_PATH" --publish never

      - name: Verify final .app signature
        shell: bash
        run: |
          APP_PATH=$(find release -maxdepth 3 -type d -name "Blog Pick.app" | head -1)
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Rename dmg to human-friendly name
        shell: bash
        run: |
          set -euo pipefail
          # 일반 사용자가 칩 종류를 알아보도록 파일명에 Intel / AppleSilicon 라벨을 붙인다.
          # (electron-builder 기본 artifactName 은 칩별 분기를 못 하므로 빌드 후 CI 에서 rename.)
          # 괄호·공백은 다운로드/공유 시 깨질 수 있어 하이픈으로 잇는다.
          LABEL="${{ matrix.label }}"
          SRC=$(find release -maxdepth 1 -name "*.dmg" | head -1)
          test -n "$SRC" || { echo "::error::dmg not found in release/"; exit 1; }
          # 파일명에 버전을 넣지 않는다(고정 이름) → releases/latest/download 영구 링크가 안 깨짐.
          DEST="release/Blog-Pick-Mac-${LABEL}.dmg"
          mv "$SRC" "$DEST"
          echo "renamed: $(basename "$SRC") -> $(basename "$DEST")"

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.arch }}-release-assets
          if-no-files-found: error
          path: |
            release/*.dmg

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-windows
      - build-macos
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          NOTES_FILE="$(mktemp)"
          cat > "$NOTES_FILE" <<'EOF'
          ## Blog Pick VERSION_PLACEHOLDER

          > ℹ️ 이번 버전부터 앱 이름이 **"App Blog Publisher" → "Blog Pick"** 으로 변경되었습니다.
          > 계정·기기·API 키 등 모든 데이터는 그대로 유지됩니다. 다만 이전 버전의 앱 파일은 자동으로 제거되지 않으니, 아래 정리 안내를 참고해 주세요.

          ### 🍎 macOS 설치 안내 (꼭 읽어주세요)

          이 앱은 Apple 개발자 인증서로 서명되지 않아, 처음 실행 시
          **"확인되지 않은 개발자" 또는 "손상되었기 때문에 열 수 없습니다"** 경고가 나타날 수 있습니다.
          아래 절차(클릭만)로 정상 실행됩니다.

          1. 내 맥 칩에 맞는 `.dmg` 를 다운로드하세요. (칩 확인: 화면 좌측 상단 🍎 → **"이 Mac에 관하여"** → "칩" 또는 "프로세서" 항목)
             - **Apple Silicon (M1~M4 칩):** `Blog-Pick-Mac-AppleSilicon.dmg`
             - **Intel 칩:** `Blog-Pick-Mac-Intel.dmg`
          2. `.dmg`를 더블클릭 → 앱을 **응용 프로그램(Applications)** 폴더로 드래그
          3. **응용 프로그램**에서 `Blog Pick` 실행 → 경고가 뜨면 **"취소"** (휴지통으로 보내지 마세요)
          4. 화면 좌측 상단 **🍎 → "시스템 설정" → "개인정보 보호 및 보안"** 으로 이동
          5. 아래로 스크롤 → **"그래도 열기"**(macOS 버전에 따라 "확인 없이 열기") 버튼 클릭 → 다시 **"열기"**. 완료!
          6. (선택) 이전 버전 `App Blog Publisher.app` 이 응용 프로그램 폴더에 남아 있다면 휴지통으로 옮겨 주세요.

          > 이 보안 경고는 Apple 공증을 받지 않은 모든 앱에 나오는 일반 안내이며, 최초 1회만 거치면 됩니다.
          > 아주 오래된 macOS에서 "그래도 열기" 버튼이 안 보이면, 터미널에서 `xattr -dr com.apple.quarantine "/Applications/Blog Pick.app"` 를 1회 실행해 주세요.

          ### 🪟 Windows 설치 안내

          `Blog-Pick-Windows.exe`를 다운로드 후 실행하세요.
          SmartScreen 경고가 뜨면 **"추가 정보" → "실행"** 으로 진행하세요.

          (선택) 이전 버전 **"App Blog Publisher"** 가 시작 메뉴/제어판 → 프로그램 추가/제거에 남아 있다면 수동으로 제거해 주세요. 데이터는 새 버전에 그대로 유지됩니다.

          ---
          Windows 자동 업데이트는 매번 설치 파일 전체(수백 MB)를 새로 받습니다. (안정성을 위해 차등 다운로드는 사용하지 않습니다.)
          EOF
          sed -i.bak "s/VERSION_PLACEHOLDER/${VERSION}/g" "$NOTES_FILE" && rm -f "${NOTES_FILE}.bak"

          # 프리릴리스(RC) 안전장치: 태그에 '-'(예: v0.3.0-rc1)가 있으면 --prerelease 로 게시하고
          # 'Latest' 로 마킹하지 않는다 → electron-updater(github provider, allowPrerelease=false)가
          # 무시하므로 기존 사용자에게 자동 배포되지 않는다. 정식 태그(v0.3.0)만 --latest 로 게시.
          if [[ "${TAG}" == *-* ]]; then
            RELEASE_FLAG="--prerelease"
            echo "[publish] prerelease 태그 감지(${TAG}) → --prerelease (사용자 자동배포 안 함)"
          else
            RELEASE_FLAG="--latest"
          fi
          if gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --repo "${REPO}" --notes-file "$NOTES_FILE" ${RELEASE_FLAG}
          else
            gh release create "${TAG}" \
              --repo "${REPO}" \
              --title "${TAG}" \
              --notes-file "$NOTES_FILE" \
              ${RELEASE_FLAG}
          fi

          while IFS= read -r file; do
            gh release upload "${TAG}" "${file}" --repo "${REPO}" --clobber
          done < <(find artifacts -type f | sort)
