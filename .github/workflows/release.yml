name: Release Desktop App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to rebuild, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Check tag matches package version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
              echo "This workflow must be run from a v*.*.* tag for publishing." >&2
              exit 1
            fi
          fi
          if [[ "${tag}" != "v${version}" ]]; then
            echo "Tag ${tag} does not match package.json version ${version}." >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    needs: validate
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\playwright-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Electron native app dependencies
        run: npx electron-builder install-app-deps

      - name: Build backend
        run: npm run build:backend:win

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build Next frontend
        run: npm run build:next

      - name: Package Windows
        run: npx electron-builder --win --x64 --publish never

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v5
        with:
          name: windows-release-assets
          if-no-files-found: error
          path: |
            release/*.exe
            release/latest.yml

  build-macos:
    name: Build macOS ${{ matrix.arch }} package
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/playwright-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Electron native app dependencies
        run: npx electron-builder install-app-deps

      - name: Build backend
        run: npm run build:backend:mac

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build Next frontend
        run: npm run build:next

      - name: Build macOS .app (unpacked)
        run: npx electron-builder --mac --${{ matrix.arch }} --dir --publish never

      - name: Apply clean ad-hoc signature
        shell: bash
        run: |
          APP_PATH=$(find release -maxdepth 3 -type d -name "Blog Pick.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "App bundle not found in release/" >&2
            exit 1
          fi
          echo "Re-signing: $APP_PATH"
          codesign --remove-signature "$APP_PATH" 2>/dev/null || true
          codesign --force --deep --sign - --timestamp=none "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | grep -E "Signature|Identifier|TeamIdentifier" || true

      - name: Package macOS .dmg/.zip from signed .app
        shell: bash
        run: |
          APP_PATH=$(find release -maxdepth 3 -type d -name "Blog Pick.app" | head -1)
          npx electron-builder --mac --${{ matrix.arch }} --prepackaged "$APP_PATH" --publish never

      - name: Verify final .app signature
        shell: bash
        run: |
          APP_PATH=$(find release -maxdepth 3 -type d -name "Blog Pick.app" | head -1)
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v5
        with:
          name: macos-${{ matrix.arch }}-release-assets
          if-no-files-found: error
          path: |
            release/*.dmg

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-windows
      - build-macos
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          NOTES_FILE="$(mktemp)"
          cat > "$NOTES_FILE" <<'EOF'
          ## Blog Pick VERSION_PLACEHOLDER

          > ℹ️ 이번 버전부터 앱 이름이 **"App Blog Publisher" → "Blog Pick"** 으로 변경되었습니다.
          > 계정·기기·API 키 등 모든 데이터는 그대로 유지됩니다. 다만 이전 버전의 앱 파일은 자동으로 제거되지 않으니, 아래 정리 안내를 참고해 주세요.

          ### 🍎 macOS 설치 안내 (꼭 읽어주세요)

          이 앱은 Apple 개발자 인증서로 서명되지 않아, 처음 실행 시
          **"확인되지 않은 개발자" 또는 "손상되었기 때문에 열 수 없습니다"** 경고가 나타날 수 있습니다.
          아래 절차(클릭만)로 정상 실행됩니다.

          1. `Blog-Pick-Mac-VERSION_PLACEHOLDER.dmg` 다운로드 (Apple Silicon · M1~M4 칩)
          2. `.dmg`를 더블클릭 → 앱을 **응용 프로그램(Applications)** 폴더로 드래그
          3. **응용 프로그램**에서 `Blog Pick` 실행 → 경고가 뜨면 **"취소"** (휴지통으로 보내지 마세요)
          4. 화면 좌측 상단 **🍎 → "시스템 설정" → "개인정보 보호 및 보안"** 으로 이동
          5. 아래로 스크롤 → **"그래도 열기"**(macOS 버전에 따라 "확인 없이 열기") 버튼 클릭 → 다시 **"열기"**. 완료!
          6. (선택) 이전 버전 `App Blog Publisher.app` 이 응용 프로그램 폴더에 남아 있다면 휴지통으로 옮겨 주세요.

          > 이 보안 경고는 Apple 공증을 받지 않은 모든 앱에 나오는 일반 안내이며, 최초 1회만 거치면 됩니다.
          > 아주 오래된 macOS에서 "그래도 열기" 버튼이 안 보이면, 터미널에서 `xattr -dr com.apple.quarantine "/Applications/Blog Pick.app"` 를 1회 실행해 주세요.

          ### 🪟 Windows 설치 안내

          `Blog-Pick-Windows-VERSION_PLACEHOLDER.exe`를 다운로드 후 실행하세요.
          SmartScreen 경고가 뜨면 **"추가 정보" → "실행"** 으로 진행하세요.

          (선택) 이전 버전 **"App Blog Publisher"** 가 시작 메뉴/제어판 → 프로그램 추가/제거에 남아 있다면 수동으로 제거해 주세요. 데이터는 새 버전에 그대로 유지됩니다.

          ---
          Windows 자동 업데이트는 매번 설치 파일 전체(수백 MB)를 새로 받습니다. (안정성을 위해 차등 다운로드는 사용하지 않습니다.)
          EOF
          sed -i.bak "s/VERSION_PLACEHOLDER/${VERSION}/g" "$NOTES_FILE" && rm -f "${NOTES_FILE}.bak"

          # --latest 를 명시해 GitHub 의 "Latest" 마킹이 새 release 로 이동하게 강제.
          # 기본 동작은 보통 새 release 를 latest 로 잡지만, 동시 publish / draft 순서
          # 변화 시 어긋날 수 있어 electron-updater 가 자동 업데이트 시 잘못된 yml 을
          # 받게 됨.
          if gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --repo "${REPO}" --notes-file "$NOTES_FILE" --latest
          else
            gh release create "${TAG}" \
              --repo "${REPO}" \
              --title "${TAG}" \
              --notes-file "$NOTES_FILE" \
              --latest
          fi

          while IFS= read -r file; do
            gh release upload "${TAG}" "${file}" --repo "${REPO}" --clobber
          done < <(find artifacts -type f | sort)
