name: Release Desktop App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to rebuild, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Check tag matches package version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
              echo "This workflow must be run from a v*.*.* tag for publishing." >&2
              exit 1
            fi
          fi
          if [[ "${tag}" != "v${version}" ]]; then
            echo "Tag ${tag} does not match package.json version ${version}." >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    needs: validate
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\playwright-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Electron native app dependencies
        run: npx electron-builder install-app-deps

      - name: Build backend
        run: npm run build:backend:win

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build Next frontend
        run: npm run build:next

      - name: Package Windows
        run: npx electron-builder --win --x64 --publish never

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml

  build-macos:
    name: Build macOS ${{ matrix.arch }} package
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/playwright-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Electron native app dependencies
        run: npx electron-builder install-app-deps

      - name: Build backend
        run: npm run build:backend:mac

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build Next frontend
        run: npm run build:next

      - name: Package macOS
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-release-assets
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.zip
            release/*.zip.blockmap
            release/latest-mac.yml

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-windows
      - build-macos
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          if ! gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --repo "${REPO}" \
              --title "${TAG}" \
              --notes "App Blog Publisher ${VERSION}"
          fi

          while IFS= read -r file; do
            gh release upload "${TAG}" "${file}" --repo "${REPO}" --clobber
          done < <(find artifacts -type f | sort)
