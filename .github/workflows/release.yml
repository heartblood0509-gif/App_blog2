name: Release Desktop App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to rebuild, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Check tag matches package version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
              echo "This workflow must be run from a v*.*.* tag for publishing." >&2
              exit 1
            fi
          fi
          if [[ "${tag}" != "v${version}" ]]; then
            echo "Tag ${tag} does not match package.json version ${version}." >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    needs: validate
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\playwright-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Electron native app dependencies
        run: npx electron-builder install-app-deps

      - name: Build backend
        run: npm run build:backend:win

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build Next frontend
        run: npm run build:next

      - name: Package Windows
        run: npx electron-builder --win --x64 --publish never

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml

  build-macos:
    name: Build macOS ${{ matrix.arch }} package
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/playwright-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Electron native app dependencies
        run: npx electron-builder install-app-deps

      - name: Build backend
        run: npm run build:backend:mac

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build Next frontend
        run: npm run build:next

      - name: Build macOS .app (unpacked)
        run: npx electron-builder --mac --${{ matrix.arch }} --dir --publish never

      - name: Apply clean ad-hoc signature
        shell: bash
        run: |
          APP_PATH=$(find release -maxdepth 3 -type d -name "App Blog Publisher.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "App bundle not found in release/" >&2
            exit 1
          fi
          echo "Re-signing: $APP_PATH"
          codesign --remove-signature "$APP_PATH" 2>/dev/null || true
          codesign --force --deep --sign - --timestamp=none "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | grep -E "Signature|Identifier|TeamIdentifier" || true

      - name: Package macOS .dmg/.zip from signed .app
        shell: bash
        run: |
          APP_PATH=$(find release -maxdepth 3 -type d -name "App Blog Publisher.app" | head -1)
          npx electron-builder --mac --${{ matrix.arch }} --prepackaged "$APP_PATH" --publish never

      - name: Verify final .app signature
        shell: bash
        run: |
          APP_PATH=$(find release -maxdepth 3 -type d -name "App Blog Publisher.app" | head -1)
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-release-assets
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.zip
            release/*.zip.blockmap
            release/latest-mac.yml

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-windows
      - build-macos
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          NOTES_FILE="$(mktemp)"
          cat > "$NOTES_FILE" <<'EOF'
          ## App Blog Publisher VERSION_PLACEHOLDER

          ### 🍎 macOS 설치 안내 (꼭 읽어주세요)

          이 앱은 Apple 개발자 인증서로 서명되지 않아, 처음 실행 시
          **"앱이 손상되었기 때문에 열 수 없습니다"** 메시지가 나타날 수 있습니다.
          아래 절차를 따르시면 정상 실행됩니다.

          1. 본인 Mac에 맞는 `.dmg` 파일 다운로드
             - Apple Silicon (M1/M2/M3/M4): `App-Blog-Publisher-VERSION_PLACEHOLDER-mac-arm64.dmg`
             - Intel Mac: `App-Blog-Publisher-VERSION_PLACEHOLDER-mac-x64.dmg`
          2. `.dmg`를 더블클릭 → 앱을 **응용 프로그램(Applications)** 폴더로 드래그
          3. **터미널** 앱을 열고 (Spotlight에서 "터미널" 검색) 아래 명령어를 그대로 붙여넣은 후 Enter:
             ```bash
             xattr -dr com.apple.quarantine "/Applications/App Blog Publisher.app"
             ```
             비밀번호는 묻지 않습니다. 아무 출력 없이 끝나면 성공입니다.
          4. **응용 프로그램**에서 `App Blog Publisher` 실행

          > 이 명령어는 macOS가 인터넷 다운로드 파일에 자동으로 붙이는 "격리(quarantine)" 표식을 제거하는 것이며, 앱 내용 자체를 수정하지 않습니다. 최초 1회만 실행하면 됩니다 (자동 업데이트로 앱이 교체되면 다시 한 번 실행).

          ### 🪟 Windows 설치 안내

          `App-Blog-Publisher-Setup-VERSION_PLACEHOLDER-x64.exe`를 다운로드 후 실행하세요.
          SmartScreen 경고가 뜨면 **"추가 정보" → "실행"** 으로 진행하세요.
          EOF
          sed -i.bak "s/VERSION_PLACEHOLDER/${VERSION}/g" "$NOTES_FILE" && rm -f "${NOTES_FILE}.bak"

          # --latest 를 명시해 GitHub 의 "Latest" 마킹이 새 release 로 이동하게 강제.
          # 기본 동작은 보통 새 release 를 latest 로 잡지만, 동시 publish / draft 순서
          # 변화 시 어긋날 수 있어 electron-updater 가 자동 업데이트 시 잘못된 yml 을
          # 받게 됨.
          if gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --repo "${REPO}" --notes-file "$NOTES_FILE" --latest
          else
            gh release create "${TAG}" \
              --repo "${REPO}" \
              --title "${TAG}" \
              --notes-file "$NOTES_FILE" \
              --latest
          fi

          while IFS= read -r file; do
            gh release upload "${TAG}" "${file}" --repo "${REPO}" --clobber
          done < <(find artifacts -type f | sort)
